AWSTemplateFormatVersion: "2010-09-09"
Description: "Arquitectura de alta disponibilidad optimizada para AWS Free Tier - 2 servidores EC2 t2.micro con NGINX, ELB y distribuido en 2 AZs"

Parameters:
  KeyName:
    Description: "Nombre del key pair para acceder a las instancias EC2"
    Type: "AWS::EC2::KeyPair::KeyName"
    Default: "lab2"
  
  InstanceType:
    Description: "Tipo de instancia EC2 (t2.micro incluido en Free Tier)"
    Type: "String"
    Default: "t2.micro"
    AllowedValues:
      - "t2.micro"
      - "t2.nano"
    ConstraintDescription: "Para mantenerse dentro del Free Tier, use t2.micro (750 hrs/mes gratis) o t2.nano"
  
  VPCId:
    Description: "ID del VPC donde desplegar los recursos"
    Type: "AWS::EC2::VPC::Id"
    Default: "vpc-xxxxxxxx"  # Reemplazar con tu VPC ID
  
  SubnetAZ1:
    Description: "Subnet ID en Zona de Disponibilidad 1"
    Type: "AWS::EC2::Subnet::Id"
    Default: "subnet-xxxxxxxx"  # Reemplazar con tu Subnet ID en AZ1
  
  SubnetAZ2:
    Description: "Subnet ID en Zona de Disponibilidad 2"
    Type: "AWS::EC2::Subnet::Id"
    Default: "subnet-yyyyyyyy"  # Reemplazar con tu Subnet ID en AZ2

Mappings:
  RegionMap:
    us-east-1:
      AMI: "ami-0c55b159cbfafe1f0"
    us-east-2:
      AMI: "ami-0112df1773dab78d9"
    us-west-1:
      AMI: "ami-0defbc65ceaa32dd1"
    us-west-2:
      AMI: "ami-0b8b44ec9a8f90422"
    eu-west-1:
      AMI: "ami-07ee5053aa22fcc0e"
    eu-central-1:
      AMI: "ami-0ea202151b77cd132"
    ap-southeast-1:
      AMI: "ami-052adc4e5f2b331d3"
    ap-northeast-1:
      AMI: "ami-0337fff9cddb16928"

Resources:
  # Security Group para EC2
  WebServerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Security group para servidores web NGINX"
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
          Description: "SSH access"
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: "HTTP access"
        - IpProtocol: "tcp"
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: "HTTPS access"
        - IpProtocol: "tcp"
          FromPort: 8000
          ToPort: 8000
          CidrIp: "0.0.0.0/0"
          Description: "ELB health check"
  
  # Security Group para ELB
  ELBSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Security group para el balanceador de carga"
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: "HTTP access from internet"
        - IpProtocol: "tcp"
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: "HTTPS access from internet"
  
  # Role y Policy para SSM (sigue siendo gratuito - solo paga por recursos AWS subyacentes)
  WebServerRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "ec2.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
  
  WebServerInstanceProfile:
    Type: "AWS::IAM::InstanceProfile"
    Properties:
      Roles:
        - !Ref WebServerRole
  
  # Launch Template - t2.micro para Free Tier
  WebServerLaunchTemplate:
    Type: "AWS::EC2::LaunchTemplate"
    Properties:
      LaunchTemplateName: "nginx-web-server-template"
      LaunchTemplateData:
        ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref WebServerSecurityGroup
        IamInstanceProfile:
          Name: !Ref WebServerInstanceProfile
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # Actualizar el sistema e instalar NGINX
            yum update -y
            yum install -y nginx
            systemctl start nginx
            systemctl enable nginx
            
            # Crear p?gina web personalizada
            cat > /usr/share/nginx/html/index.html << EOF
            <!DOCTYPE html>
            <html>
            <head>
                <title>Alta Disponibilidad NGINX - Free Tier</title>
                <style>
                    body {
                        font-family: Arial, sans-serif;
                        text-align: center;
                        padding: 50px;
                        background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
                        color: white;
                    }
                    h1 {
                        font-size: 48px;
                        margin-bottom: 20px;
                    }
                    .free-tier-badge {
                        background: #f39c12;
                        padding: 10px;
                        border-radius: 5px;
                        display: inline-block;
                        margin-bottom: 20px;
                    }
                    .server-info {
                        background: rgba(255,255,255,0.2);
                        padding: 20px;
                        border-radius: 10px;
                        margin-top: 30px;
                    }
                </style>
            </head>
            <body>
                <div class="free-tier-badge">
                    ? OPTIMIZADO PARA AWS FREE TIER
                </div>
                <h1>Bienvenido al Cluster NGINX</h1>
                <p>?Arquitectura de alta disponibilidad sin costo adicional!</p>
                <div class="server-info">
                    <p><strong>Servidor:</strong> $(hostname -f)</p>
                    <p><strong>IP Privada:</strong> $(hostname -I | cut -d' ' -f1)</p>
                    <p><strong>Zona de Disponibilidad:</strong> $(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)</p>
                    <p><strong>Fecha y Hora:</strong> $(date)</p>
                </div>
            </body>
            </html>
            EOF
            
            # Configurar health check endpoint
            echo "OK" > /usr/share/nginx/html/health
            
            # Reiniciar NGINX
            systemctl restart nginx
  
  # Auto Scaling Group - Configurado para 2 instancias (optimizaci?n Free Tier)
  WebServerAutoScalingGroup:
    Type: "AWS::AutoScaling::AutoScalingGroup"
    Properties:
      AutoScalingGroupName: "nginx-ha-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref WebServerLaunchTemplate
        Version: !GetAtt WebServerLaunchTemplate.LatestVersionNumber
      MinSize: "2"
      MaxSize: "2"
      DesiredCapacity: "2"
      HealthCheckType: "ELB"
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier:
        - !Ref SubnetAZ1
        - !Ref SubnetAZ2
      TargetGroupARNs:
        - !Ref WebTargetGroup
      Tags:
        - Key: "Name"
          Value: "nginx-web-server-free-tier"
          PropagateAtLaunch: true
        - Key: "Environment"
          Value: "free-tier"
          PropagateAtLaunch: true
  
  # Application Load Balancer (750 horas/mes gratis)
  ApplicationLoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: "nginx-alb-free"
      Scheme: "internet-facing"
      Type: "application"
      IpAddressType: "ipv4"
      SecurityGroups:
        - !Ref ELBSecurityGroup
      Subnets:
        - !Ref SubnetAZ1
        - !Ref SubnetAZ2
  
  # Target Group
  WebTargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      Name: "nginx-target-group-free"
      Protocol: "HTTP"
      Port: 80
      VpcId: !Ref VPCId
      HealthCheckEnabled: true
      HealthCheckPath: "/health"
      HealthCheckProtocol: "HTTP"
      HealthCheckPort: "80"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      TargetType: "instance"
  
  # Listener para HTTP
  LoadBalancerListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      DefaultActions:
        - Type: "forward"
          TargetGroupArn: !Ref WebTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: "HTTP"

# Outputs
Outputs:
  LoadBalancerDNS:
    Description: "DNS Name del Application Load Balancer (Free Tier)"
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  
  FreeTierInfo:
    Description: "INFORMACI?N FREE TIER: 2 instancias t2.micro (750hrs/mes) + ALB (750hrs/mes) incluidos"
    Value: "Usa t2.micro para mantenerte en Free Tier. 2 instancias consumen ~1488 hrs/mes - no excedas el l?mite de 750hrs gratuitas mensuales. Considera detener el stack cuando no lo uses."
  
  AutoScalingGroupName:
    Description: "Nombre del Auto Scaling Group"
    Value: !Ref WebServerAutoScalingGroup
  
  WebServerSecurityGroupID:
    Description: "ID del Security Group de los servidores web"
    Value: !Ref WebServerSecurityGroup
  
  TargetGroupArn:
    Description: "ARN del Target Group"
    Value: !Ref WebTargetGroup